<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Alumno — Q-LIT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-body: #f8fafc;
            --sidebar-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --brand-cyan: #06b6d4;
            --brand-indigo: #4f46e5;
            --border-color: #e2e8f0;
            --radius-xl: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Lateral */
        aside {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
            flex-shrink: 0;
        }

        .side-logo {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 48px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .side-logo .dot {
            width: 8px;
            height: 8px;
            background: var(--brand-cyan);
            border-radius: 50%;
        }

        nav {
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.2s;
        }

        .nav-item:hover,
        .nav-item.active {
            background-color: #f1f5f9;
            color: var(--brand-indigo);
        }

        .user-profile {
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--brand-indigo), var(--brand-cyan));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }

        /* Contenido Principal */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 48px 60px;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header-actions h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .btn-join {
            background-color: var(--text-main);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-join:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -6px rgba(15, 23, 42, 0.2);
        }

        /* Grid de Clases Asignadas */
        .class-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .class-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 28px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .class-card:hover {
            border-color: var(--brand-cyan);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -12px rgba(15, 23, 42, 0.06);
        }

        .role-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
            background: #ecfdf5;
            color: #10b981;
        }

        .class-card h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .class-card p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .class-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 18px;
            border-top: 1px solid #f1f5f9;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Modal */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background: white;
            width: 90%;
            max-width: 450px;
            border-radius: var(--radius-xl);
            padding: 40px;
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            from {
                transform: translateY(15px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal h2 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .modal p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--brand-cyan);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 28px;
        }

        .btn-cancel {
            background: #f1f5f9;
            color: var(--text-muted);
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-submit {
            background: var(--text-main);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <aside>
        <div class="side-logo">Q-LIT<div class="dot"></div>
        </div>
        <nav>
            <a href="#" class="nav-item active"><i class="fa-solid fa-layer-group"></i> Mis Laboratorios</a>
            <a href="#" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Mi Progreso</a>
            <a href="#" class="nav-item"><i class="fa-solid fa-sliders"></i> Ajustes</a>
        </nav>
        <div class="user-profile">
            <div class="avatar">YM</div>
            <div class="user-info">
                <span>Yasleb Macias</span>
                <small>Estudiante</small>
            </div>
        </div>
    </aside>

    <main>
        <div class="header-actions">
            <h1>Tus laboratorios activos</h1>
            <button class="btn-join" id="open-join-modal">
                <i class="fa-solid fa-plus"></i> Inscribirse a Clase
            </button>
        </div>

        <div class="class-grid" id="student-classes">
            <div class="class-card" onclick="window.location.href='class-feed-alumno.html'">
                <span class="role-badge">Estudiante</span>
                <h3>Bases de Datos Relacionales</h3>
                <p>Prof. Vázquez Cruz</p>
                <div class="class-footer">
                    <span><i class="fa-solid fa-database" style="color: var(--brand-cyan);"></i> 8 Prácticas</span>
                    <span>Precisión: 88%</span>
                </div>
            </div>
        </div>
    </main>

    <div class="overlay" id="join-overlay">
        <div class="modal">
            <h2>Unirse a una clase</h2>
            <p>Introduce el código alfanumérico que te asignó tu docente.</p>
            <div class="input-group">
                <label>Código de acceso</label>
                <input type="text" id="class-code" placeholder="Ej: SQL-102-QL">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="close-modal">Cancelar</button>
                <button class="btn-submit" onclick="joinClass()">Inscribirse</button>
            </div>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('join-overlay');
        document.getElementById('open-join-modal').onclick = () => overlay.style.display = 'flex';
        document.getElementById('close-modal').onclick = () => overlay.style.display = 'none';

        function joinClass() {
            const code = document.getElementById('class-code').value;
            if (!code) return alert('Ingresa un código válido');
            alert('Te has unido exitosamente a la asignatura.');
            overlay.style.display = 'none';
        }
    </script>
</body>

</html>
